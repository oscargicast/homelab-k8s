apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://8gears.container-registry.com/chartrepo/library
      chart: n8n
      targetRevision: "0.25.*"
      helm:
        valueFiles:
          - $values/automation/n8n/values.yaml
    - repoURL: https://github.com/TU_USUARIO/homelab-k8s.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: automation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
