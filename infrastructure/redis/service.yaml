apiVersion: v1
kind: Service
metadata:
  name: infisical-redis
  namespace: infisical
  labels:
    app.kubernetes.io/name: infisical-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: infisical
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: infisical-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
