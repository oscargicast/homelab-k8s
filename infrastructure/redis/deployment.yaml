apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-redis
  namespace: infisical
  labels:
    app.kubernetes.io/name: infisical-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: infisical
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: infisical-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infisical-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: infisical
    spec:
      containers:
        - name: redis
          image: redis:8.6.3-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --save
            - ""
            - --appendonly
            - "no"
          envFrom:
            - secretRef:
                name: infisical-redis-auth
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
