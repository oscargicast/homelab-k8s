apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: evolution-postgres
  namespace: databases
spec:
  instances: 1
  storage:
    size: 5Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: evolution
      owner: evolution
      secret:
        name: evolution-db-user
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: true
