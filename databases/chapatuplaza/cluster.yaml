apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: chapatuplaza
  namespace: databases
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie
  storage:
    size: 10Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: chapatuplaza
      owner: chapatuplaza
      secret:
        name: chapatuplaza-db-user
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: true
