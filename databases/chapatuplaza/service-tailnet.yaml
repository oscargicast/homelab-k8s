apiVersion: v1
kind: Service
metadata:
  name: chapatuplaza-tailnet
  namespace: databases
  annotations:
    tailscale.com/hostname: "chapatuplaza"
    tailscale.com/tags: "tag:k8s-db"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    cnpg.io/cluster: chapatuplaza
    role: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
