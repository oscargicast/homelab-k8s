apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-monitoring-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Homelab
data:
  homelab-monitoring.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "liveNow": false,
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["homelab"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Homelab Monitoring",
      "uid": "homelab-monitoring",
      "weekStart": "",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU usage",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": false },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory usage",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": false },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Disk usage (/)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} * 100)",
              "legendFormat": "{{instance}} {{mountpoint}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": false },
            "tooltip": { "mode": "single", "sort": "none" }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Network I/O",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*|cali.*|cni.*|flannel.*\"}[5m]))",
              "legendFormat": "RX"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*|cali.*|cni.*|flannel.*\"}[5m]))",
              "legendFormat": "TX"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          }
        }
      ]
    }
