apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: speedtest-tracker
  namespace: homelab
  labels:
    app.kubernetes.io/name: speedtest-tracker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: speedtest-tracker
  endpoints:
    - port: http
      path: /api/v1/prometheus
      interval: 60s
      authorization:
        type: Bearer
        credentials:
          name: speedtest-tracker-secrets
          key: PROMETHEUS_API_KEY
