apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: speedtest-tracker-secrets
  namespace: homelab
spec:
  resyncInterval: 60
  authentication:
    kubernetesAuth:
      identityId: eb8dcdde-9d20-49e5-a2ff-28e7598bee36
      serviceAccountRef:
        name: infisical-operator-controller-manager
        namespace: infisical-operator
  projectSlug: homelab-k8s
  envSlug: prod
  secretsPath: /homelab/speedtest-tracker
  managedSecretReference:
    secretName: speedtest-tracker-secrets
    secretNamespace: homelab
    creationPolicy: Owner
