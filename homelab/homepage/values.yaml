replicaCount: 1

image:
  repository: ghcr.io/gethomepage/homepage
  tag: "v1.13.1"

enableRbac: true

env:
  HOMEPAGE_ALLOWED_HOSTS: "*"

serviceAccount:
  create: true

resources:
  requests:
    memory: 64Mi
    cpu: 10m
  limits:
    memory: 128Mi
    cpu: 100m

config:
  bookmarks: []
  settings:
    title: "Homelab"
    theme: dark
    color: slate
    headerStyle: clean
    background:
      image: https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=2560&q=80
      blur: sm
      brightness: 50
      opacity: 60
    layout:
      Cluster:
        style: row
        columns: 2
      Automatización:
        style: row
        columns: 2
      Observabilidad:
        style: row
        columns: 2
      Databases:
        style: row
        columns: 3
      Personal:
        style: row
        columns: 1
  kubernetes:
    mode: cluster
  services:
    - Cluster:
        - Overview:
            description: Estado general del cluster
            href: "https://grafana.oscargicast.com"
            icon: kubernetes.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Pods running
                  query: sum(kube_pod_status_phase{phase="Running"})
                - label: Pods pending
                  query: sum(kube_pod_status_phase{phase="Pending"})
                - label: Active alerts
                  query: sum(ALERTS{alertstate="firing"})
                - label: Ingress req/s
                  query: sum(rate(traefik_service_requests_total[5m]))
                  format:
                    type: number
                    suffix: /s
                - label: Node CPU %
                  query: 1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))
                  format:
                    type: percent
                - label: Node mem used
                  query: sum(node_memory_MemTotal_bytes) - sum(node_memory_MemAvailable_bytes)
                  format:
                    type: bytes
        - Argo CD:
            href: "https://argocd.oscargicast.com"
            description: GitOps controller
            icon: argo-cd.png
    - Automatización:
        - n8n:
            href: "https://n8n.oscargicast.com/"
            description: Workflows
            icon: n8n.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Memoria
                  query: sum(container_memory_working_set_bytes{namespace="automation",pod=~"n8n-.*"})
                  format:
                    type: bytes
                - label: CPU
                  query: sum(rate(container_cpu_usage_seconds_total{namespace="automation",pod=~"n8n-.*"}[5m]))
                  format:
                    type: percent
                - label: Heap n8n
                  query: sum(n8n_nodejs_heap_size_used_bytes{job="n8n"})
                  format:
                    type: bytes
                - label: Eventloop lag
                  query: max(n8n_nodejs_eventloop_lag_seconds{job="n8n"})
                  format:
                    type: duration
        - Evolution API:
            href: "https://evolution.oscargicast.com/manager/"
            description: WhatsApp API
            icon: whatsapp.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Instancias
                  query: evolution_instances_total
                - label: Estado
                  query: max(evolution_instance_up)
                  format:
                    type: number
                - label: Memoria
                  query: sum(container_memory_working_set_bytes{namespace="automation",pod=~"evolution-api-.*"})
                  format:
                    type: bytes
                - label: CPU
                  query: sum(rate(container_cpu_usage_seconds_total{namespace="automation",pod=~"evolution-api-.*"}[5m]))
                  format:
                    type: percent
    - Observabilidad:
        - Grafana:
            href: "https://grafana.oscargicast.com"
            description: Dashboards y logs
            icon: grafana.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Estado
                  query: max(up{job="prometheus-grafana"})
                  format:
                    type: number
                - label: Memoria
                  query: sum(container_memory_working_set_bytes{namespace="observability",pod=~"prometheus-grafana-.*"})
                  format:
                    type: bytes
                - label: Dashboards
                  query: max(grafana_stat_totals_dashboard)
        - Prometheus:
            href: "https://grafana.oscargicast.com/explore"
            description: Métricas time-series
            icon: prometheus.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Targets up
                  query: count(up == 1)
                - label: Alertas activas
                  query: sum(ALERTS{alertstate="firing"}) or vector(0)
                - label: Series
                  query: prometheus_tsdb_head_series
                - label: Storage
                  query: sum(prometheus_tsdb_storage_blocks_bytes)
                  format:
                    type: bytes
    - Databases:
        - postgres-lab:
            description: CNPG cluster general purpose
            href: "https://grafana.oscargicast.com/d/cloudnative-pg/cloudnativepg?var-cluster=postgres-lab&var-namespace=databases"
            icon: postgres.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Connections
                  query: sum(cnpg_backends_total{namespace="databases",pod=~"postgres-lab-.*"})
                - label: DB size
                  query: sum(cnpg_pg_database_size_bytes{namespace="databases",pod=~"postgres-lab-.*"})
                  format:
                    type: bytes
                - label: TPS
                  query: sum(rate(cnpg_pg_stat_database_xact_commit{namespace="databases",pod=~"postgres-lab-.*"}[5m])) + sum(rate(cnpg_pg_stat_database_xact_rollback{namespace="databases",pod=~"postgres-lab-.*"}[5m]))
                  format:
                    type: number
                    suffix: /s
        - n8n-postgres:
            description: CNPG cluster (backing n8n)
            href: "https://grafana.oscargicast.com/d/cloudnative-pg/cloudnativepg?var-cluster=n8n-postgres&var-namespace=databases"
            icon: postgres.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Connections
                  query: sum(cnpg_backends_total{namespace="databases",pod=~"n8n-postgres-.*"})
                - label: DB size
                  query: sum(cnpg_pg_database_size_bytes{namespace="databases",pod=~"n8n-postgres-.*"})
                  format:
                    type: bytes
                - label: TPS
                  query: sum(rate(cnpg_pg_stat_database_xact_commit{namespace="databases",pod=~"n8n-postgres-.*"}[5m])) + sum(rate(cnpg_pg_stat_database_xact_rollback{namespace="databases",pod=~"n8n-postgres-.*"}[5m]))
                  format:
                    type: number
                    suffix: /s
        - evolution-postgres:
            description: CNPG cluster (backing Evolution API)
            href: "https://grafana.oscargicast.com/d/cloudnative-pg/cloudnativepg?var-cluster=evolution-postgres&var-namespace=databases"
            icon: postgres.png
            widget:
              type: prometheusmetric
              url: http://prometheus-kube-prometheus-prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: Connections
                  query: sum(cnpg_backends_total{namespace="databases",pod=~"evolution-postgres-.*"})
                - label: DB size
                  query: sum(cnpg_pg_database_size_bytes{namespace="databases",pod=~"evolution-postgres-.*"})
                  format:
                    type: bytes
                - label: TPS
                  query: sum(rate(cnpg_pg_stat_database_xact_commit{namespace="databases",pod=~"evolution-postgres-.*"}[5m])) + sum(rate(cnpg_pg_stat_database_xact_rollback{namespace="databases",pod=~"evolution-postgres-.*"}[5m]))
                  format:
                    type: number
                    suffix: /s
    - Personal:
        - GitHub:
            href: "https://github.com/oscargicast"
            description: Contribution heatmap
            icon: github.png
            widget:
              type: iframe
              name: GitHub Contributions
              src: https://ghchart.rshah.org/oscargicast
              classes: h-32 w-full
              referrerPolicy: no-referrer
              allowScrolling: "no"
              loadingStrategy: eager
  widgets:
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
        cputemp: false
        uptime: true
        disk: /
        label: System
    - iframe:
        name: Monitoring
        src: https://grafana-internal.oscargicast.com/d/homelab-monitoring/homelab-monitoring?orgId=1&theme=dark&kiosk=tv&refresh=30s
        classes: h-[480px] w-full
        referrerPolicy: no-referrer
        allowScrolling: "no"
        loadingStrategy: lazy
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: false
    - openmeteo:
        label: Lima
        latitude: -12.0464
        longitude: -77.0428
        timezone: America/Lima
        units: metric
        cache: 5
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "homelab"
        nodes:
          show: false
