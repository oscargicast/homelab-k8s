replicaCount: 1

enableRbac: true

env:
  HOMEPAGE_ALLOWED_HOSTS: "oscar-mini-m1.tail90f0a7.ts.net:8080"

serviceAccount:
  create: true

resources:
  requests:
    memory: 64Mi
    cpu: 10m
  limits:
    memory: 128Mi
    cpu: 100m

ingress:
  main:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix

config:
  kubernetes:
    mode: cluster
  bookmarks:
    - Observabilidad:
        - Grafana:
            - href: "http://oscar-mini-m1.tail90f0a7.ts.net:8080/grafana"
              description: Métricas y logs
        - Prometheus:
            - href: "http://oscar-mini-m1.tail90f0a7.ts.net:8080/prometheus"
              description: Prometheus UI
  services:
    - Automatización:
        - n8n:
            href: "http://oscar-mini-m1.tail90f0a7.ts.net:8080/n8n/"
            description: Workflows
            icon: n8n.png
    - Databases:
        - CloudNativePG:
            href: "https://cloudnative-pg.io"
            description: PostgreSQL operator
  widgets:
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "homelab"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
